<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Gwaro Capital</title>
  <meta name="description" content="Create an account with Gwaro Capital to access premium MT5 automation and AI trading signals.">
  <meta name="keywords" content="Gwaro Capital register, sign up, MT5">
  <meta property="og:title" content="Gwaro Capital — Register">
  <meta property="og:description" content="Create an account to access premium MT5 automation and AI signals.">
  <link rel="canonical" href="https://gwarocapital.com{{ request.path }}">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-shell">
        <form class="auth-card" method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="auth-brand">GWARO CAPITAL</div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join the professional trading platform.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flash-list">
                  {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>

            <div class="auth-links">
                <a href="/login">Already have an account?</a>
            </div>
        </form>
    </div>
</body>
</html>
