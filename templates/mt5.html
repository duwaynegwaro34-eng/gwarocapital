<!DOCTYPE html>
<html>

<head>
    <title>Connect MT5</title>
</head>

<body>

<h1>Connect Your MT5 Account</h1>

<form method="POST">

    <input
        type="text"
        name="account"
        placeholder="MT5 Account Number"
        required
    >

    <br><br>

    <input
        type="text"
        name="server"
        placeholder="Broker Server"
        required
    >

    <br><br>

    <input
        type="text"
        name="name"
        placeholder="Account Name"
        required
    >

    <br><br>

    <button type="submit">
        Connect MT5
    </button>

</form>

</body>

</html>
